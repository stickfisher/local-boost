services:
  - type: web
    name: local-boost
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT systems.webhook_server:app
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: AGENTMAIL_API_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
