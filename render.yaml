services:
  - type: web
    name: local-boost
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir /app -w 4 -b 0.0.0.0:$PORT server:app
    plan: free
    envVars:
      - key: AGENTMAIL_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
